version: "3.9"

services:
  # ──────────────────────────────
  # NestJS Backend
  # ──────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: navigate-ai-backend
    restart: unless-stopped
    ports:
      - "${PORT:-3002}:3002"
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
    volumes:
      - ./backend/keys:/app/keys:ro
      - ./backend/semantic-models:/app/semantic-models:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3002/api/docs"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ──────────────────────────────
  # React Frontend — client app (port 3000)
  # ──────────────────────────────
  frontend:
    image: navigate-ai-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:3002/api/v1}
        REACT_APP_ADMIN_COGNITO_USER_POOL_ID: ${REACT_APP_ADMIN_COGNITO_USER_POOL_ID}
        REACT_APP_ADMIN_COGNITO_CLIENT_ID:    ${REACT_APP_ADMIN_COGNITO_CLIENT_ID}
    container_name: navigate-ai-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network

  # ──────────────────────────────
  # Admin Dashboard — separate port (7429)
  # Same image as frontend — nginx restricts /admin route only
  # Port 7429 is intentionally non-obvious to clients
  # ──────────────────────────────
  admin:
    image: navigate-ai-frontend   # reuse the same built image — no separate build needed
    container_name: navigate-ai-admin
    restart: unless-stopped
    ports:
      - "${ADMIN_PORT:-7429}:80"
    depends_on:
      - frontend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
